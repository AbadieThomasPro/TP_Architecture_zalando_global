services:
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - customer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: order_service_user
      POSTGRES_PASSWORD: order_service_password
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_service_user -d order_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-db:
    image: postgres:16-alpine
    container_name: analytics-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: superset-dev-secret-key
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_FIRSTNAME: Admin
      SUPERSET_ADMIN_LASTNAME: User
      SUPERSET_ADMIN_EMAIL: admin@example.com
    depends_on:
      analytics-db:
        condition: service_healthy
    volumes:
      - ./superset:/app/docker
      - superset_home:/app/superset_home
    command: >
      /bin/sh -c "
      python -m pip install --user psycopg2-binary &&
      superset db upgrade &&
      superset fab create-admin
      --username $$SUPERSET_ADMIN_USERNAME
      --firstname $$SUPERSET_ADMIN_FIRSTNAME
      --lastname $$SUPERSET_ADMIN_LASTNAME
      --email $$SUPERSET_ADMIN_EMAIL
      --password $$SUPERSET_ADMIN_PASSWORD || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"

  analytics-etl:
    build:
      context: ./analytics-etl
    profiles: ["etl"]
    environment:
      CUSTOMER_DB_HOST: customer-db
      CUSTOMER_DB_PORT: "5432"
      CUSTOMER_DB_NAME: customer_db
      CUSTOMER_DB_USER: postgres
      CUSTOMER_DB_PASSWORD: postgres
      CATALOG_DB_HOST: catalog-db
      CATALOG_DB_PORT: "5432"
      CATALOG_DB_NAME: catalog_db
      CATALOG_DB_USER: catalog_user
      CATALOG_DB_PASSWORD: catalog_password
      ORDER_DB_HOST: order-db
      ORDER_DB_PORT: "5432"
      ORDER_DB_NAME: order_service_db
      ORDER_DB_USER: order_service_user
      ORDER_DB_PASSWORD: order_service_password
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: "5432"
      ANALYTICS_DB_NAME: analytics_db
      ANALYTICS_DB_USER: analytics_user
      ANALYTICS_DB_PASSWORD: analytics_password
    depends_on:
      customer-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      order-db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy

  catalog-service:
    build:
      context: ./catalog-service
    container_name: catalog-service
    command: sh -c "python manage.py migrate && python manage.py seed_catalog && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: django-insecure-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,catalog-service
      DB_NAME: catalog_db
      DB_USER: catalog_user
      DB_PASSWORD: catalog_password
      DB_HOST: catalog-db
      DB_PORT: "5432"
    depends_on:
      catalog-db:
        condition: service_healthy
    volumes:
      - ./catalog-service:/app

  customer-service:
    build:
      context: ./customer-service
    container_name: customer-service
    command: sh -c "python manage.py migrate && (python manage.py shell -c \"from customers.models import Customer; import sys; sys.exit(0 if Customer.objects.exists() else 1)\" || python manage.py loaddata customers/fixtures/customers_data.json) && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    environment:
      DJANGO_SECRET_KEY: django-insecure-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,customer-service
      DB_NAME: customer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: customer-db
      DB_PORT: "5432"
    depends_on:
      customer-db:
        condition: service_healthy
    volumes:
      - ./customer-service:/app

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8002:8000"
    environment:
      SECRET_KEY: change-me
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1,order-service
      POSTGRES_DB: order_service_db
      POSTGRES_USER: order_service_user
      POSTGRES_PASSWORD: order_service_password
      POSTGRES_HOST: order-db
      POSTGRES_PORT: "5432"
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      USE_MOCK_SERVICES: "0"
    depends_on:
      order-db:
        condition: service_healthy
      customer-service:
        condition: service_started
      catalog-service:
        condition: service_started
    volumes:
      - ./order-service:/app

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    command: npm run dev
    ports:
      - "4000:4000"
    depends_on:
      - catalog-service
      - customer-service
      - order-service
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  catalog_postgres_data:
  customer_postgres_data:
  order_postgres_data:
  analytics_postgres_data:
  frontend_node_modules:
  superset_home:
