services:
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-service:
    build: .
    container_name: catalog-service
    command: sh -c "python manage.py migrate && python manage.py seed_catalog && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: django-insecure-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: catalog_db
      DB_USER: catalog_user
      DB_PASSWORD: catalog_password
      DB_HOST: catalog-db
      DB_PORT: "5432"
    depends_on:
      catalog-db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  catalog_postgres_data:
